# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# ESLint is a tool for identifying and reporting on patterns
# found in ECMAScript/JavaScript code.
# More details at https://github.com/eslint/eslint
# and https://eslint.org

name: ESLint

on:
  push:
    branches: [ dev, main ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ dev, main ]
  schedule:
    - cron: '38 5 * * 2'

jobs:
  eslint:
    if:  (github.event_name == 'push') || ( (github.event_name == 'pull_request') && ((github.actor != 'AlterTobi') && (github.actor != 'dependabot[bot]'))) 
    name: Run eslint scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci

      - name: Run ESLint and Convert
        run: |
          npx eslint . --config eslint.config.mjs -f json > eslint-results.json || true
          node eslint-to-sarif.mjs < eslint-results.json
        continue-on-error: true

      - name: Upload to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

#      - uses: actions/upload-artifact@v4
#        with:
#          name: linter-dev-sarif
#          path: results.sarif